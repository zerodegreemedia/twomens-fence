<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .container {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      hsla(150, 30%, 12%, 0.92) 0%,
      hsla(150, 20%, 18%, 0.85) 50%,
      hsla(150, 30%, 12%, 0.88) 100%
    );
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
    text-align: center;
  }
  .logo {
    width: 340px;
    height: auto;
    margin-bottom: 36px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }
  .divider {
    width: 80px;
    height: 3px;
    background: hsl(38, 92%, 50%);
    border-radius: 2px;
    margin-bottom: 28px;
  }
  .tagline {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.5px;
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .sub {
    font-size: 18px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.3px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
    padding: 10px 24px;
    border-radius: 999px;
    background: hsla(38, 92%, 50%, 0.15);
    border: 1px solid hsla(38, 92%, 50%, 0.3);
    color: hsl(38, 92%, 55%);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .stars { font-size: 18px; }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: hsl(38, 92%, 50%);
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <img class="bg-image" src="../public/img/gallery/gallery-03-wood-privacy-backyard.webp" alt="">
  <div class="overlay"></div>
  <div class="content">
    <img class="logo" src="../public/img/logo/logo-white.svg" alt="TWO MEN Fence">
    <div class="divider"></div>
    <div class="tagline">Fences, Decks & Tree Services</div>
    <div class="sub">Delaware & Pennsylvania &middot; Free Estimates &middot; Licensed & Insured</div>
    <div class="badge">
      <span class="stars">&#9733;</span>
      Satisfaction Guaranteed
    </div>
  </div>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
